<!DOCTYPE html>
<html>
<head>
  <title>DairyVend</title>
  <link rel="stylesheet" href="/static/apple.css">
  
  <style>
    /* 1. Reverted to your original body styling */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      color: #1d1d1f;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 2. The Liquid Glass Effect */
    .card {
      text-align: center;
      padding: 50px;
      width: 320px;
      border-radius: 24px;
      
      /* The Magic Glass Properties */
      background: rgba(255, 255, 255, 0.25); /* Semi-transparent white */
      backdrop-filter: blur(16px);           /* Blurs what is behind the card */
      -webkit-backdrop-filter: blur(16px);   /* For Safari support */
      border: 1px solid rgba(255, 255, 255, 0.5); /* Subtle white edge reflection */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1); /* Soft drop shadow for depth */
    }

    /* 3. The scanning ring */
    .scan-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(0, 113, 227, 0.1); /* Subtle blue tint */
      border: 2px solid rgba(0, 113, 227, 0.5); /* Apple blue border */
      margin: 0 auto 30px auto;
      box-shadow: 0 0 20px rgba(0, 113, 227, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.7; box-shadow: 0 0 0 0 rgba(0, 113, 227, 0.4); }
      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 20px 10px rgba(0, 113, 227, 0); }
      100% { transform: scale(0.95); opacity: 0.7; box-shadow: 0 0 0 0 rgba(0, 113, 227, 0); }
    }

    .detected {
      animation: none;
      background: #0071e3; 
      border-color: #0071e3;
      box-shadow: 0 0 30px rgba(0, 113, 227, 0.6);
      transition: all 0.3s ease;
    }

    #status {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 10px;
    }

    .label {
      /* CHANGED: Much darker color to match the status text, plus slightly thicker weight */
      color: #1d1d1f; 
      font-size: 0.95rem;
      font-weight: 500; 
    }
  </style>

  <script>
    function pollRFID() {
      fetch("/api/rfid/latest")
        .then(r => r.json())
        .then(d => {
          if (d.uid) {
            document.getElementById("status").innerText = "Card Detected";
            document.getElementById("ring").classList.add("detected");

            setTimeout(() => {
              window.location.href = "/ui/milk";
            }, 1200);
          }
        })
        .catch(err => console.error("Waiting for scan...", err)); 
    }
    setInterval(pollRFID, 700);
  </script>
</head>

<body>
  <div class="cow-container">
    <div class="walking-cow"></div>
  </div>

  <header>
    <h1>DairyVend</h1>
    <p>Smart RFID Milk Vending</p>
  </header>

  <div class="container">
    <div class="card">
      <div id="ring" class="scan-ring"></div>
      <div class="value" id="status">Scan your RFID card</div>
      <div class="label">Hold card near reader</div>
    </div>
  </div>
</body>
</html>
